        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); border-top: 6px solid #146c2e; }
        h1 { color: #146c2e; font-size: 20px; text-align: center; margin: 0 0 5px 0; }
        .location { text-align: center; font-size: 14px; color: #888; margin-bottom: 20px; }
        .date-container { text-align: center; font-size: 17px; font-weight: 600; color: #222; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .countdown-container { text-align: center; background: linear-gradient(135deg, #146c2e, #1e8f3f); padding: 25px 20px; border-radius: 16px; margin-bottom: 25px; color: white; box-shadow: 0 4px 15px rgba(20, 108, 46, 0.2); }
        .countdown-label { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.9; margin-bottom: 5px; }
        .countdown-time { font-size: 42px; font-weight: 800; margin: 5px 0; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
        .prayer-list { list-style: none; padding: 0; margin: 0; }
        .prayer-item { display: flex; justify-content: space-between; padding: 16px 15px; border-radius: 12px; margin-bottom: 5px; font-size: 17px; font-weight: 500; transition: background 0.2s; }
        .active { background-color: #e8f5e9; color: #146c2e; font-weight: 700; border-left: 4px solid #146c2e; }
        .shuruq { color: #f57c00; font-size: 15px; opacity: 0.8; }
        .message { text-align: center; color: #666; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

        <div class="countdown-container">
            <div class="countdown-label" id="countdown-label">Prochaine prière : <span id="next-prayer-name">...</span></div>
            <div class="countdown-time" id="countdown">--:--:--</div>
        </div>

        <ul class="prayer-list" id="prayer-list">

    </div>

            "2026-03-03": { "Sobh": "05:25", "Chourouq": "06:51", "Dohr": "12:44", "Asr": "15:56", "Maghrib": "18:29", "Icha": "19:44" },

            "2026-03-11": { "Sobh": "05:15", "Chourouq": "06:40", "Dohr": "12:42", "Asr": "15:59", "Maghrib": "18:36", "Icha": "19:50" },

            "2026-03-13": { "Sobh": "05:12", "Chourouq": "06:38", "Dohr": "12:42", "Asr": "16:00", "Maghrib": "18:37", "Icha": "19:52" },

            "2026-03-16": { "Sobh": "05:08", "Chourouq": "06:34", "Dohr": "12:41", "Asr": "16:01", "Maghrib": "18:40", "Icha": "19:54" },
            "2026-03-17": { "Sobh": "05:07", "Chourouq": "06:32", "Dohr": "12:41", "Asr": "16:01", "Maghrib": "18:41", "Icha": "19:55" },
            "2026-03-18": { "Sobh": "05:05", "Chourouq": "06:31", "Dohr": "12:40", "Asr": "16:02", "Maghrib": "18:41", "Icha": "19:56" },
            "2026-03-19": { "Sobh": "05:04", "Chourouq": "06:30", "Dohr": "12:40", "Asr": "16:02", "Maghrib": "18:42", "Icha": "19:57" },
            "2026-03-20": { "Sobh": "05:02", "Chourouq": "06:28", "Dohr": "12:40", "Asr": "16:02", "Maghrib": "18:43", "Icha": "19:58" }
        };

        function formatDateKey(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getPrayerDateObject(dateObj, timeString) {
            const [hours, minutes] = timeString.split(':');
            const prayerDate = new Date(dateObj);
            prayerDate.setHours(parseInt(hours), parseInt(minutes), 0, 0);
            return prayerDate;
        }

        function updateApp() {
            const now = new Date();
            const todayKey = formatDateKey(now);
            const todayData = prayerData[todayKey];

            const listEl = document.getElementById('prayer-list');
            
            // Si on est en dehors du mois de Ramadan 1447 (avant ou après)
            if (!todayData) {
                document.getElementById('display-date').innerText = now.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                document.getElementById('countdown-label').innerText = "Hors période";
                document.getElementById('countdown').innerText = "--:--:--";
                listEl.innerHTML = '<div class="message">Les horaires de Ramadan 1447 ne sont pas disponibles pour cette date.</div>';
                return;
            }

            // Affichage de la date en français
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            // Mettre la première lettre en majuscule
            let dateStr = now.toLocaleDateString('fr-FR', options);
            document.getElementById('display-date').innerText = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

            let nextPrayer = null;
            let nextPrayerTime = null;

            // Déterminer la prochaine prière
            for (const [name, time] of Object.entries(todayData)) {
                if (name === "Chourouq") continue; // On ne compte pas le Chourouq comme une prière attendue

                const prayerTimeObj = getPrayerDateObject(now, time);
                if (prayerTimeObj > now) {
                    nextPrayer = name;
                    nextPrayerTime = prayerTimeObj;
                    break; // On a trouvé la prochaine, on s'arrête
                }
            }

            // Si toutes les prières d'aujourd'hui sont passées (après l'Icha)
            if (!nextPrayer) {
                const tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const tomorrowKey = formatDateKey(tomorrow);
                
                if (prayerData[tomorrowKey]) {
                    nextPrayer = "Sobh (Demain)";
                    nextPrayerTime = getPrayerDateObject(tomorrow, prayerData[tomorrowKey]["Sobh"]);
                }
            }

            // Mise à jour de la liste des prières du jour
            listEl.innerHTML = '';
            for (const [name, time] of Object.entries(todayData)) {
                const li = document.createElement('li');
                li.className = 'prayer-item';
                
                // Mettre en surbrillance la prochaine prière
                if (nextPrayer === name) li.classList.add('active');
                if (name === "Chourouq") li.classList.add('shuruq');
                
                li.innerHTML = `<span>${name}</span><span>${time}</span>`;
                listEl.appendChild(li);
            }

            // Mise à jour du compte à rebours
            if (nextPrayerTime) {
                document.getElementById('next-prayer-name').innerText = nextPrayer;
                const diff = nextPrayerTime - now;
                
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
                const m = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
                const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
                
                document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
            } else {
                document.getElementById('countdown-label').innerText = "Ramadan terminé";
                document.getElementById('countdown').innerText = "00:00:00";
            }
        }

        setInterval(updateApp, 1000);
        updateApp(); 
    </script>

</html>
