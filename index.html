<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horaires de Prière - Salé</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); border-top: 6px solid #2c3e50; text-align: center; }
        h1 { color: #2c3e50; font-size: 20px; margin: 0; }
        .location { font-size: 14px; color: #888; margin-bottom: 15px; }
        .countdown-container { background: linear-gradient(135deg, #2c3e50, #34495e); padding: 20px; border-radius: 16px; margin-bottom: 20px; color: white; }
        .countdown-time { font-size: 40px; font-weight: 800; margin: 5px 0; }
        .prayer-list { list-style: none; padding: 0; margin: 0; text-align: left; }
        .prayer-item { display: flex; justify-content: space-between; padding: 14px; border-radius: 10px; margin-bottom: 5px; }
        .active { background-color: #ecf0f1; color: #2c3e50; font-weight: bold; border-left: 4px solid #2c3e50; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1 id="hijri-title">Chargement...</h1>
        <div class="location">Rabat - Salé (GMT+1)</div>
        <div id="display-date" style="font-weight: bold; margin-bottom: 15px;"></div>
        <div class="countdown-container">
            <div id="next-prayer-name">Prochaine prière</div>
            <div class="countdown-time" id="countdown">00:00:00</div>
        </div>
        <ul class="prayer-list" id="prayer-list"></ul>
    </div>

    <script>
        const prayerData = {
            "2026-04-19": { "m": "Dhou al-Qi'dah", "h": 1, "Sobh": "05:17", "Chourouq": "06:49", "Dohr": "13:32", "Asr": "17:07", "Maghrib": "20:06", "Icha": "21:25" },
            "2026-04-20": { "m": "Dhou al-Qi'dah", "h": 2, "Sobh": "05:16", "Chourouq": "06:48", "Dohr": "13:31", "Asr": "17:07", "Maghrib": "20:07", "Icha": "21:26" },
            "2026-04-21": { "m": "Dhou al-Qi'dah", "h": 3, "Sobh": "05:14", "Chourouq": "06:46", "Dohr": "13:31", "Asr": "17:07", "Maghrib": "20:07", "Icha": "21:27" },
            "2026-04-22": { "m": "Dhou al-Qi'dah", "h": 4, "Sobh": "05:13", "Chourouq": "06:45", "Dohr": "13:31", "Asr": "17:07", "Maghrib": "20:08", "Icha": "21:28" },
            "2026-04-23": { "m": "Dhou al-Qi'dah", "h": 5, "Sobh": "05:11", "Chourouq": "06:44", "Dohr": "13:31", "Asr": "17:07", "Maghrib": "20:09", "Icha": "21:29" }
        };

        function update() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const data = prayerData[todayStr];
            if(!data) return;

            document.getElementById('hijri-title').innerText = `✨ ${data.h} ${data.m} 1447`;
            document.getElementById('display-date').innerText = now.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});

            let nextP = null, nextT = null;
            const prayers = ["Sobh", "Chourouq", "Dohr", "Asr", "Maghrib", "Icha"];
            
            for (const name of prayers) {
                const [h, m] = data[name].split(':');
                const pTime = new Date(); pTime.setHours(h, m, 0);
                if (pTime > now) { nextP = name; nextT = pTime; break; }
            }

            if (!nextT) {
                const tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const tomorrowStr = tomorrow.toISOString().split('T')[0];
                const nextData = prayerData[tomorrowStr];
                if (nextData) {
                    const [h, m] = nextData["Sobh"].split(':');
                    nextT = new Date(tomorrow); nextT.setHours(h, m, 0);
                    nextP = "Sobh (demain)";
                }
            }

            const list = document.getElementById('prayer-list');
            list.innerHTML = '';
            for (const name of prayers) {
                const li = document.createElement('li');
                li.className = 'prayer-item ' + (nextP === name ? 'active' : '');
                li.innerHTML = `<span>${name}</span><span>${data[name]}</span>`;
                list.appendChild(li);
            }

            if (nextT) {
                document.getElementById('next-prayer-name').innerText = "Prochaine : " + nextP;
                const diff = nextT - now;
                const hh = Math.floor(diff/3600000).toString().padStart(2,'0');
                const mm = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const ss = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('countdown').innerText = `${hh}:${mm}:${ss}`;
            }
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
