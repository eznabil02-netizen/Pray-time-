<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horaires de Prière - Salé (Chouwal)</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); border-top: 6px solid #146c2e; text-align: center; }
        h1 { color: #146c2e; font-size: 20px; margin: 0; }
        .location { font-size: 14px; color: #888; margin-bottom: 15px; }
        .countdown-container { background: linear-gradient(135deg, #146c2e, #1e8f3f); padding: 20px; border-radius: 16px; margin-bottom: 20px; color: white; }
        .countdown-time { font-size: 40px; font-weight: 800; margin: 5px 0; }
        .prayer-list { list-style: none; padding: 0; margin: 0; text-align: left; }
        .prayer-item { display: flex; justify-content: space-between; padding: 14px; border-radius: 10px; margin-bottom: 5px; }
        .active { background-color: #e8f5e9; color: #146c2e; font-weight: bold; border-left: 4px solid #146c2e; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1 id="hijri-title">🌟 Chouwal 1447</h1>
        <div class="location">Rabat - Salé (GMT+1)</div>

        <div id="display-date" style="font-weight: bold; margin-bottom: 15px;"></div>
        
        <div class="countdown-container">
            <div id="next-prayer-name">Chargement...</div>
            <div class="countdown-time" id="countdown">00:00:00</div>
        </div>

        <ul class="prayer-list" id="prayer-list"></ul>
    </div>

    <script>
        const prayerData = {
            "2026-03-24": { "h": 5, "Sobh": "05:57", "Chourouq": "07:23", "Dohr": "13:39", "Asr": "17:03", "Maghrib": "19:46", "Icha": "21:01" },
            "2026-03-25": { "h": 6, "Sobh": "05:55", "Chourouq": "07:22", "Dohr": "13:38", "Asr": "17:03", "Maghrib": "19:47", "Icha": "21:02" },
            "2026-03-26": { "h": 7, "Sobh": "05:54", "Chourouq": "07:20", "Dohr": "13:38", "Asr": "17:04", "Maghrib": "19:47", "Icha": "21:03" },
            "2026-03-27": { "h": 8, "Sobh": "05:52", "Chourouq": "07:19", "Dohr": "13:38", "Asr": "17:04", "Maghrib": "19:48", "Icha": "21:04" },
            "2026-03-28": { "h": 9, "Sobh": "05:51", "Chourouq": "07:17", "Dohr": "13:37", "Asr": "17:04", "Maghrib": "19:49", "Icha": "21:05" }
        };

        function update() {
            const now = new Date();
            const dateKey = now.toISOString().split('T')[0];
            const data = prayerData[dateKey];
            if(!data) return;

            document.getElementById('hijri-title').innerText = "🌟 " + data.h + " Chouwal 1447";
            document.getElementById('display-date').innerText = now.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});

            let nextP = null, nextT = null;
            const list = document.getElementById('prayer-list');
            list.innerHTML = '';

            const prayers = ["Sobh", "Chourouq", "Dohr", "Asr", "Maghrib", "Icha"];

            for (const name of prayers) {
                const time = data[name];
                const [h, m] = time.split(':');
                const pTime = new Date(); pTime.setHours(h, m, 0);

                if (!nextP && pTime > now) { 
                    nextP = name; nextT = pTime; 
                }

                const li = document.createElement('li');
                li.className = 'prayer-item ' + (nextP === name ? 'active' : '');
                li.innerHTML = `<span>${name}</span><span>${time}</span>`;
                list.appendChild(li);
            }

            if (nextT) {
                document.getElementById('next-prayer-name').innerText = "Prochaine : " + nextP;
                const diff = nextT - now;
                const hh = Math.floor(diff/3600000).toString().padStart(2,'0');
                const mm = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const ss = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('countdown').innerText = `${hh}:${mm}:${ss}`;
            }
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
