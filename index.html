<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horaires Prière - Salé (Ramadan & Chouwal)</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f4f8; color: #2d3436; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 8px solid #0984e3; text-align: center; }
        h1 { color: #0984e3; font-size: 22px; margin: 0; }
        .month-label { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 14px; font-weight: bold; margin-top: 5px; background: #dfe6e9; }
        .location { font-size: 14px; color: #636e72; margin-bottom: 15px; }
        .btn-notif { background: #0984e3; color: white; border: none; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: bold; margin-bottom: 20px; width: 100%; transition: 0.3s; }
        .btn-notif.active { background: #b2bec3; }
        .countdown-container { background: linear-gradient(135deg, #0984e3, #00cec9); padding: 20px; border-radius: 20px; margin-bottom: 20px; color: white; }
        .countdown-time { font-size: 42px; font-weight: 800; }
        .prayer-list { list-style: none; padding: 0; margin: 0; text-align: left; }
        .prayer-item { display: flex; justify-content: space-between; padding: 14px; border-radius: 12px; margin-bottom: 6px; border: 1px solid #f1f2f6; }
        .active { background-color: #e1f5fe; color: #0984e3; font-weight: bold; border: 1px solid #0984e3; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1 id="month-title">Chargement...</h1>
        <div id="month-badge" class="month-label"></div>
        <div class="location">Rabat - Salé (GMT)</div>
        
        <button id="btnNotif" class="btn-notif" onclick="enableNotifications()">🔔 Activer les Alertes Adhan</button>

        <div id="display-date" style="font-weight: bold; margin-bottom: 15px;"></div>
        
        <div class="countdown-container">
            <div id="next-prayer-name">Prochaine prière</div>
            <div class="countdown-time" id="countdown">00:00:00</div>
        </div>

        <ul class="prayer-list" id="prayer-list"></ul>
    </div>

    <script>
        const prayerData = {
            // Fin du mois de Ramadan 1447
            "2026-03-18": { "m": "Ramadan", "Sobh": "05:05", "Chourouq": "06:31", "Dohr": "12:40", "Asr": "16:02", "Maghrib": "18:41", "Icha": "19:56" },
            "2026-03-19": { "m": "Ramadan", "Sobh": "05:04", "Chourouq": "06:30", "Dohr": "12:40", "Asr": "16:02", "Maghrib": "18:42", "Icha": "19:57" },
            "2026-03-20": { "m": "Ramadan", "Sobh": "05:02", "Chourouq": "06:28", "Dohr": "12:40", "Asr": "16:02", "Maghrib": "18:43", "Icha": "19:58" },
            // Mois de Chouwal 1447 (Début 20 mars selon document Chouwal)
            "2026-03-21": { "m": "Chouwal", "Sobh": "05:01", "Chourouq": "06:27", "Dohr": "12:40", "Asr": "16:03", "Maghrib": "18:44", "Icha": "19:58" },
            "2026-03-22": { "m": "Chouwal", "Sobh": "04:59", "Chourouq": "06:26", "Dohr": "13:39", "Asr": "17:03", "Maghrib": "19:44", "Icha": "20:59" },
            "2026-03-23": { "m": "Chouwal", "Sobh": "04:58", "Chourouq": "06:24", "Dohr": "13:39", "Asr": "17:03", "Maghrib": "19:45", "Icha": "21:00" },
            "2026-03-24": { "m": "Chouwal", "Sobh": "04:57", "Chourouq": "06:23", "Dohr": "13:39", "Asr": "17:03", "Maghrib": "19:46", "Icha": "21:01" },
            "2026-03-25": { "m": "Chouwal", "Sobh": "04:55", "Chourouq": "06:22", "Dohr": "13:38", "Asr": "17:03", "Maghrib": "19:47", "Icha": "21:02" },
            "2026-03-26": { "m": "Chouwal", "Sobh": "04:54", "Chourouq": "06:20", "Dohr": "13:38", "Asr": "17:04", "Maghrib": "19:47", "Icha": "21:03" },
            "2026-03-27": { "m": "Chouwal", "Sobh": "04:52", "Chourouq": "06:19", "Dohr": "13:38", "Asr": "17:04", "Maghrib": "19:48", "Icha": "21:04" },
            "2026-03-28": { "m": "Chouwal", "Sobh": "04:51", "Chourouq": "06:17", "Dohr": "13:37", "Asr": "17:04", "Maghrib": "19:49", "Icha": "21:05" },
            "2026-03-29": { "m": "Chouwal", "Sobh": "04:49", "Chourouq": "06:16", "Dohr": "13:37", "Asr": "17:04", "Maghrib": "19:50", "Icha": "21:05" },
            "2026-03-30": { "m": "Chouwal", "Sobh": "04:48", "Chourouq": "06:15", "Dohr": "13:37", "Asr": "17:04", "Maghrib": "19:50", "Icha": "21:06" },
            "2026-03-31": { "m": "Chouwal", "Sobh": "04:46", "Chourouq": "06:13", "Dohr": "13:37", "Asr": "17:05", "Maghrib": "19:51", "Icha": "21:07" },
            "2026-04-01": { "m": "Chouwal", "Sobh": "04:44", "Chourouq": "06:12", "Dohr": "13:36", "Asr": "17:05", "Maghrib": "19:52", "Icha": "21:08" },
            "2026-04-02": { "m": "Chouwal", "Sobh": "04:43", "Chourouq": "06:11", "Dohr": "13:36", "Asr": "17:05", "Maghrib": "19:53", "Icha": "21:09" },
            "2026-04-03": { "m": "Chouwal", "Sobh": "04:41", "Chourouq": "06:09", "Dohr": "13:36", "Asr": "17:05", "Maghrib": "19:53", "Icha": "21:10" }
        };

        let notifEnabled = false;

        function enableNotifications() {
            Notification.requestPermission().then(p => {
                if (p === "granted") {
                    notifEnabled = true;
                    document.getElementById('btnNotif').innerText = "🔔 Alertes Activées";
                    document.getElementById('btnNotif').classList.add('active');
                    new Audio('https://www.islamcan.com/audio/adhan/azan1.mp3').play();
                }
            });
        }

        function update() {
            const now = new Date();
            const dateKey = now.toISOString().split('T')[0];
            const data = prayerData[dateKey];
            if(!data) return;

            document.getElementById('month-title').innerText = data.m === "Ramadan" ? "🌙 Ramadan 1447" : "🌟 Chouwal 1447";
            document.getElementById('month-badge').innerText = data.m;
            document.getElementById('display-date').innerText = now.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});

            let nextP = null, nextT = null;
            const list = document.getElementById('prayer-list');
            list.innerHTML = '';

            for (const [name, time] of Object.entries(data)) {
                if (name === "m") continue;
                const [h, m] = time.split(':');
                const pTime = new Date(); pTime.setHours(h, m, 0);

                if (!nextP && pTime > now && name !== "Chourouq") { 
                    nextP = name; nextT = pTime; 
                }

                if (notifEnabled && name !== "Chourouq" && now.getHours() == h && now.getMinutes() == m && now.getSeconds() == 0) {
                    new Notification("C'est l'heure de " + name);
                    new Audio('https://www.islamcan.com/audio/adhan/azan1.mp3').play();
                }

                const li = document.createElement('li');
                li.className = 'prayer-item ' + (nextP === name ? 'active' : '');
                li.innerHTML = `<span>${name}</span><span>${time}</span>`;
                list.appendChild(li);
            }

            if (nextT) {
                document.getElementById('next-prayer-name').innerText = "Prochaine : " + nextP;
                const diff = nextT - now;
                const hh = Math.floor(diff/3600000).toString().padStart(2,'0');
                const mm = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const ss = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('countdown').innerText = `${hh}:${mm}:${ss}`;
            }
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
