<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horaires Prière Salé - Chouwal</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 380px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid #2ecc71; }
        h1 { color: #2ecc71; margin: 10px 0; font-size: 22px; }
        .date-info { color: #7f8c8d; margin-bottom: 15px; font-weight: bold; }
        .countdown { background: #2ecc71; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 22px; font-weight: bold; }
        .prayer-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
        .next { background: #e8f8f5; color: #27ae60; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌟 Chouwal 1447</h1>
        <div class="date-info" id="current-date"></div>
        <div class="countdown" id="timer">Calcul...</div>
        <div id="list"></div>
    </div>

    <script>
        const data = {
            // Horaires exacts extraits de votre document (GMT+1)
            "2026-03-23": { "Jour": 4, "Sobh": "05:58", "Dohr": "13:39", "Asr": "17:03", "Maghrib": "19:45", "Icha": "21:00" },
            "2026-03-24": { "Jour": 5, "Sobh": "05:57", "Dohr": "13:39", "Asr": "17:03", "Maghrib": "19:46", "Icha": "21:01" },
            "2026-03-25": { "Jour": 6, "Sobh": "05:55", "Dohr": "13:38", "Asr": "17:03", "Maghrib": "19:47", "Icha": "21:02" },
            "2026-03-26": { "Jour": 7, "Sobh": "05:54", "Dohr": "13:38", "Asr": "17:04", "Maghrib": "19:47", "Icha": "21:03" },
            "2026-03-27": { "Jour": 8, "Sobh": "05:52", "Dohr": "13:38", "Asr": "17:04", "Maghrib": "19:48", "Icha": "21:04" }
        };

        function update() {
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const d = data[today];
            if (!d) return;

            document.getElementById('current-date').innerText = now.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}) + " (" + d.Jour + " Chouwal)";

            let nextName = "", nextTime = null;
            let html = "";
            
            for (let p of ["Sobh", "Dohr", "Asr", "Maghrib", "Icha"]) {
                const [h, m] = d[p].split(':');
                const pDate = new Date(); pDate.setHours(h, m, 0);
                
                let isNext = false;
                if (!nextTime && pDate > now) {
                    nextName = p; nextTime = pDate; isNext = true;
                }
                html += `<div class="prayer-row ${isNext ? 'next' : ''}"><span>${p}</span><span>${d[p]}</span></div>`;
            }
            document.getElementById('list').innerHTML = html;

            if (nextTime) {
                const diff = nextTime - now;
                const hh = Math.floor(diff/3600000).toString().padStart(2,'0');
                const mm = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const ss = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = nextName + " dans " + hh + ":" + mm + ":" + ss;
            } else {
                document.getElementById('timer').innerText = "Prières terminées pour aujourd'hui";
            }
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
